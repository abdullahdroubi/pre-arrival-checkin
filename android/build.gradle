allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects { project ->
    // app_links 6.4.1 references flutter.compileSdkVersion in its module script.
    // On older Flutter/Gradle combinations this property is missing for plugin modules.
    if (project.name == "app_links" && !project.hasProperty("flutter")) {
        project.ext.flutter = [compileSdkVersion: 34]
    }
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
