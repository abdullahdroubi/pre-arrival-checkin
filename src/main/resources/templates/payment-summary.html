<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment summary · Pre-arrival check-in</title>
    <th:block th:replace="~{fragments/checkin-assets :: styles}"></th:block>
</head>
<body class="chk-page payment-flow">
<div class="bg-pattern" aria-hidden="true"></div>
<th:block th:replace="~{fragments/checkin-navbar :: nav(false)}"></th:block>

<div class="container py-4 position-relative">
    <div class="progress-container" data-reveal style="overflow-x:auto;">
        <div class="progress-steps" style="min-width:680px;">
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Personal</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Further</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">EAT</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Confirm</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Upgrade</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Accept &amp; Sign</div></div>
            <div class="step active"><div class="step-circle">7</div><div class="step-label">Payment</div></div>
        </div>
    </div>

    <h1 class="page-title text-center" data-reveal>Payment summary</h1>
    <p class="text-muted text-center mb-4" data-reveal>No extra charges apply. Your booking is complete for the selected room and guest count.</p>

    <div class="receipt-wrap" data-reveal>
        <div class="receipt">
            <h2>Payment summary</h2>
            <div class="row-line"><span th:text="${roomCostLabel}">Room cost</span><span th:text="${lineRoom}">0 JD</span></div>
            <div class="row-line"><span>Taxes &amp; fees</span><span th:text="${lineTaxes}">0 JD</span></div>
            <div class="row-line"><span>Service charge</span><span th:text="${lineService}">0 JD</span></div>
            <div class="row-line discount"><span>Early bird discount</span><span th:text="'(' + ${lineDiscount} + ')'">(0 JD)</span></div>
            <div class="dashed"></div>
            <div class="total-row">
                <span class="lbl">Total amount</span>
                <span class="amt" th:text="${totalAmount}">0 JD</span>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/checkin/confirmation(booking=${bookingReference})}" class="btn btn-continue btn-lg">Continue</a>
    </div>
</div>
<th:block th:replace="~{fragments/checkin-assets :: scripts}"></th:block>
</body>
</html>
