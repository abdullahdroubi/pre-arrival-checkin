<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong</title>
    <th:block th:replace="~{fragments/checkin-assets :: styles}"></th:block>
</head>
<body class="chk-page">
<div class="bg-pattern" aria-hidden="true"></div>
<th:block th:replace="~{fragments/checkin-navbar :: nav(false)}"></th:block>

<main class="container py-5 position-relative chk-page-shell chk-page-shell--narrow">
    <div class="alert alert-danger" data-reveal role="alert">
        <h1 class="h5 chk-result-title mb-2">We couldn’t complete that</h1>
        <p class="mb-0" th:text="${error}">An error occurred.</p>
    </div>
</main>
<th:block th:replace="~{fragments/checkin-assets :: scripts}"></th:block>
</body>
</html>
