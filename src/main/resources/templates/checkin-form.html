<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Pre-Arrival Check-In Form</h1>

    <form th:action="@{/checkin/submit}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="bookingReference" th:value="${booking.bookingReference}">
        <input type="hidden" th:name="bookingId" th:value="${booking.id}">
        <input type="hidden" th:name="guestEmail" th:value="${guestEmail}">

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" th:name="guestFirstName" th:value="${booking.guestFirstName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" th:name="guestLastName" th:value="${booking.guestLastName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" th:name="guestPhone" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estimated Arrival Time</label>
            <input type="time" class="form-control" th:name="estimatedArrivalTime" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Upload ID/Passport</label>
            <input type="file" class="form-control" th:name="idDocument" accept="image/*,.pdf" required>
        </div>

        <div class="mb-3">
            <label>
                <input type="checkbox" th:name="policiesAccepted" required>
                I accept the hotel policies
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Submit Check-In</button>
    </form>
</div>
</body>
</html>
