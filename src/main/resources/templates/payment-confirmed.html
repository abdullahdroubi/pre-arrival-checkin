<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment confirmed · Pre-arrival check-in</title>
    <th:block th:replace="~{fragments/checkin-assets :: styles}"></th:block>
</head>
<body class="chk-page payment-flow">
<div class="bg-pattern" aria-hidden="true"></div>
<nav class="navbar navbar-custom">
    <div class="container">
        <span class="navbar-brand"><i class="fas fa-gem me-2 opacity-75"></i>reterra</span>
    </div>
</nav>

<div class="container py-4 position-relative">
    <div class="progress-container" data-reveal style="overflow-x:auto;">
        <div class="progress-steps" style="min-width:680px;">
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Personal</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Further</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">EAT</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Confirm</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Upgrade</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Accept &amp; Sign</div></div>
            <div class="step completed"><div class="step-circle"></div><div class="step-label">Payment</div></div>
        </div>
    </div>

    <h1 class="page-title text-center mb-2" data-reveal>Payment confirmed</h1>
    <p class="text-center text-muted mb-4" data-reveal>Your stay has been fully paid. No further action is needed for this step.</p>

    <div class="receipt-wrap" data-reveal>
        <div class="receipt">
            <h2>Payment summary</h2>
            <div class="row-line"><span th:text="${roomCostLabel}">Room</span><span th:text="${lineAccommodationTotal}">0 JD</span></div>
            <div class="row-line" th:if="${lineGuestSupplement != null}">
                <span>Additional guests</span>
                <span th:text="${lineGuestSupplement}">0 JD</span>
            </div>
            <div class="row-line"><span>Taxes &amp; fees</span><span th:text="${lineFullTaxes}">0 JD</span></div>
            <div class="row-line"><span>Service charge</span><span th:text="${lineFullService}">0 JD</span></div>
            <div class="dashed"></div>
            <div class="total-row">
                <span class="lbl">Total amount</span>
                <span class="amt" th:text="${totalPaidSummary}">0 JD</span>
            </div>
        </div>
    </div>

    <div class="text-center mt-4" data-reveal>
        <a th:href="@{/checkin/confirmation(booking=${bookingReference})}" class="btn btn-done btn-lg">Continue to confirmation</a>
    </div>
</div>
<th:block th:replace="~{fragments/checkin-assets :: scripts}"></th:block>
</body>
</html>
