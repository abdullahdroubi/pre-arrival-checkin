<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room upgrade · Pre-arrival check-in</title>
    <th:block th:replace="~{fragments/checkin-assets :: styles}"></th:block>
</head>

<body class="chk-page">
    <div class="bg-pattern" aria-hidden="true"></div>
    <nav class="navbar navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-gem me-2 opacity-75"></i>reterra
            </a>
            <a href="#" class="back-link" onclick="history.back(); return false;">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="progress-container" style="overflow-x:auto;">
            <div class="progress-steps" style="min-width:640px;">
                <div class="step completed">
                    <div class="step-circle"></div>
                    <div class="step-label">Personal Information</div>
                </div>
                <div class="step completed">
                    <div class="step-circle"></div>
                    <div class="step-label">Further details</div>
                </div>
                <div class="step completed">
                    <div class="step-circle"></div>
                    <div class="step-label">EAT</div>
                </div>
                <div class="step completed">
                    <div class="step-circle"></div>
                    <div class="step-label">Confirm information</div>
                </div>
                <div class="step active">
                    <div class="step-circle">5</div>
                    <div class="step-label">Room upgrade</div>
                </div>
                <div class="step">
                    <div class="step-circle">6</div>
                    <div class="step-label">Accept &amp; Sign</div>
                </div>
                <div class="step">
                    <div class="step-circle">7</div>
                    <div class="step-label">Payment</div>
                </div>
            </div>
        </div>

        <h1 class="page-title">Your Room &amp; Upgrade Options</h1>
        <p class="text-muted" th:text="${currencyNote}">Prices are in Jordanian Dinar (JD).</p>

        <div th:if="${upgradeError != null}" class="alert alert-warning" role="alert" th:text="${upgradeError}">
        </div>

        <form th:if="${upgradeOptions != null && !upgradeOptions.isEmpty()}"
              th:action="@{/checkin/upgrade-room/submit}" method="post">
            <input type="hidden" th:name="bookingReference" th:value="${bookingReference}">
            <input type="hidden" th:name="bookingId" th:value="${bookingId}">
            <input type="hidden" th:name="guestEmail" th:value="${guestEmail}">

            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-4" th:each="opt, iter : ${upgradeOptions}">
                    <input type="radio" th:id="${'offer' + iter.index}" name="upgradeOffer"
                           th:value="${opt.radioValue}" th:checked="${opt.currentSelection}">
                    <label th:for="${'offer' + iter.index}" class="upgrade-card">
                        <img class="offer-image" th:src="${opt.imageUrl}" alt="Room">
                        <div class="offer-title" th:text="${opt.title}">Room</div>
                        <div class="offer-subtitle" th:text="${opt.subtitle}">Details</div>
                        <div class="offer-price mt-2" th:text="${opt.formattedTotal}">0.00 JD</div>
                        <div class="offer-badge" th:if="${opt.offerBadge != null}">
                            <i class="fas fa-tags"></i>
                            <span th:text="${opt.offerBadge}">Offer</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="actions-row">
                <button type="button" class="btn-skip" onclick="document.getElementById('skipForm').submit();">
                    Skip
                </button>
                <button type="submit" class="btn-upgrade">
                    Continue
                </button>
            </div>
        </form>

        <div th:if="${upgradeOptions == null || upgradeOptions.isEmpty()}" class="alert alert-info">
            No bookable rooms are listed for your stay right now. Use Skip to continue.
        </div>

        <div th:if="${upgradeOptions == null || upgradeOptions.isEmpty()}" class="actions-row">
            <button type="submit" class="btn-upgrade" form="skipForm">Skip</button>
        </div>

        <form id="skipForm" th:action="@{/checkin/upgrade-room/skip}" method="post" style="display:none;">
            <input type="hidden" th:name="bookingReference" th:value="${bookingReference}">
            <input type="hidden" th:name="bookingId" th:value="${bookingId}">
            <input type="hidden" th:name="guestEmail" th:value="${guestEmail}">
        </form>
    </div>
    <th:block th:replace="~{fragments/checkin-assets :: scripts}"></th:block>
</body>
</html>
